<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<link rel="stylesheet" href="register.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="heading">
  <h1>FaceTrace Pro</h1>
  <h2>Report Missing Case</h2>
</div>
  <form>
  <div class="main">
    <div class="submain">
<div class="form-group">
    <div>
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" placeholder="Enter Your First Name">
    </div>
    <div>
 <label for="lastName">Last Name</label>
      <input type="text" id="lastName" placeholder="Enter your Surname">
    </div>
</div>
    <div class="form-group1">
      <div>
      <label for="fathersName">Father's Name</label>
      <input type="text" id="fathersName" placeholder="Enter Father's Name">
      </div>
    <div>
      <label for="dateOfBirth">Date of Birth</label>
      <input type="date" id="dateOfBirth" placeholder="dd-mm-yyyy">
    </div>
    </div>
    <div class="form-group2">
      <label for="address">Address</label>
      <textarea id="address" placeholder="Enter your Address"></textarea>
    </div>
    <div class="form-group3">
      <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="yourEmail@example.com">
      <p class="privacy-note">We never share your email with anyone.</p>
    </div>
    <div>
      <label for="phoneNumber">Phone Number</label>
      <input type="tel" id="phoneNumber" placeholder="Phone Number">
    </div>
    </div>
    <div class="form-group4">
      <div>
      <label for="aadharNumber">Aadhar Number</label>
      <input type="text" id="aadharNumber" placeholder="2000-10000 30000">
    </div>
    <div>
      <label for="missingDate">Missing Date</label>
      <input type="date" id="missingDate" placeholder="dd-mm-yyyy">
    </div>
    </div>
    <div class="form-group5">
      <label for="gender"></label>
      <div class="gender-options">
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
      </div>
    </div>
    <div class="form-group6">
      <label for="image">Image</label>
      <input type="file" id="image">
      <p class="file-status">No file chosen</p>
    </div>
    <button type="submit">Go to the Surveillance Mode</button>
</div>
</div>  
</form>
</div>
</body>
</html>
